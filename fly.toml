app = 'emftattoos'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 8621
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
